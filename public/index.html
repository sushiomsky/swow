<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wizard of Wor Battle Royale</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 12px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }
        #status-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gray;
        }
        .status-dot.connected    { background: #4caf50; }
        .status-dot.connecting   { background: #ff9800; }
        .status-dot.disconnected { background: #f44336; }
        canvas {
            border: 2px solid #555;
            background: #1a1a2e;
        }
        #controls-help {
            margin-top: 10px;
            display: flex;
            gap: 40px;
            font-size: 0.78rem;
            color: #aaa;
        }
        #controls-help .p1 { color: #5599ff; }
        #controls-help .p2 { color: #55cc55; }
    </style>
</head>
<body>
<h1>⚔ Wizard of Wor Battle Royale</h1>

<div id="status-bar">
    <div class="status-item">
        <div id="dot-p1" class="status-dot connecting"></div>
        <span id="label-p1">Player 1: connecting…</span>
    </div>
    <div class="status-item">
        <div id="dot-p2" class="status-dot connecting"></div>
        <span id="label-p2">Player 2: connecting…</span>
    </div>
</div>

<canvas id="gameCanvas" width="600" height="600"></canvas>

<div id="controls-help">
    <div class="p1">
        <strong>Player 1 (Blue)</strong><br>
        Move: Arrow Keys<br>
        Shoot: Space
    </div>
    <div class="p2">
        <strong>Player 2 (Green)</strong><br>
        Move: W A S D<br>
        Shoot: E
    </div>
</div>

<script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const TILE  = 20;           // Pixels per tile (must match server MAP dimensions)
    const WS_URL = `ws://${location.hostname}:5001`;

    // ─── Canvas setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ─── Player definitions ───────────────────────────────────────────────────
    /**
     * Each entry represents one local player / WebSocket connection.
     * `localId` is filled in when the server sends back the assigned player ID.
     */
    const players = [
        {
            index:   1,
            color:   'blue',
            localId: null,
            ws:      null,
            dotEl:   document.getElementById('dot-p1'),
            labelEl: document.getElementById('label-p1'),
            controls: {
                up:    'ArrowUp',
                down:  'ArrowDown',
                left:  'ArrowLeft',
                right: 'ArrowRight',
                shoot: ' ',
            },
        },
        {
            index:   2,
            color:   'green',
            localId: null,
            ws:      null,
            dotEl:   document.getElementById('dot-p2'),
            labelEl: document.getElementById('label-p2'),
            controls: {
                up:    'w',
                down:  's',
                left:  'a',
                right: 'd',
                shoot: 'e',
            },
        },
    ];

    // Latest game state received from either connection (they share state)
    let latestGameState = null;

    // ─── WebSocket helpers ────────────────────────────────────────────────────

    /**
     * Set the connection-status indicator for a player entry.
     * @param {object} playerEntry
     * @param {'connecting'|'connected'|'disconnected'} status
     */
    function setStatus(playerEntry, status) {
        playerEntry.dotEl.className = `status-dot ${status}`;
        const text = status === 'connected'
            ? `Player ${playerEntry.index}: connected`
            : status === 'connecting'
            ? `Player ${playerEntry.index}: connecting…`
            : `Player ${playerEntry.index}: disconnected`;
        playerEntry.labelEl.textContent = text;
    }

    /**
     * Open a WebSocket for a player and wire up all event handlers.
     * Re-renders whenever a new game-state message arrives.
     * @param {object} playerEntry  One element from the `players` array
     */
    function connectPlayer(playerEntry) {
        setStatus(playerEntry, 'connecting');
        const ws = new WebSocket(WS_URL);
        playerEntry.ws = ws;

        ws.addEventListener('open', () => {
            setStatus(playerEntry, 'connected');
        });

        ws.addEventListener('message', (event) => {
            let data;
            try {
                data = JSON.parse(event.data);
            } catch (err) {
                console.error('Failed to parse server message:', err);
                return;
            }

            // The server sends { playerId, players, shots } on first message;
            // subsequent broadcasts also include playerId for convenience.
            if (data.playerId && !playerEntry.localId) {
                playerEntry.localId = data.playerId;
            }

            // Update shared game state and re-render
            latestGameState = data;
            render(latestGameState);
        });

        ws.addEventListener('close', () => {
            setStatus(playerEntry, 'disconnected');
            // Attempt to reconnect after 2 seconds
            setTimeout(() => connectPlayer(playerEntry), 2000);
        });

        ws.addEventListener('error', (err) => {
            console.error(`WebSocket error (Player ${playerEntry.index}):`, err);
        });
    }

    // Open both connections
    players.forEach(connectPlayer);

    // ─── Input handling ───────────────────────────────────────────────────────

    /** Send a movement command on behalf of a player. */
    function sendMove(ws, dx, dy) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'movement', data: { x: dx, y: dy } }));
    }

    /** Send a shoot command on behalf of a player. */
    function sendShoot(ws) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'shoot' }));
    }

    document.addEventListener('keydown', (event) => {
        // Prevent the page from scrolling when using arrow keys or spacebar
        const navKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
        if (navKeys.includes(event.key)) event.preventDefault();

        for (const player of players) {
            const c = player.controls;
            if (event.key === c.up)    { sendMove(player.ws,  0, -1); return; }
            if (event.key === c.down)  { sendMove(player.ws,  0,  1); return; }
            if (event.key === c.left)  { sendMove(player.ws, -1,  0); return; }
            if (event.key === c.right) { sendMove(player.ws,  1,  0); return; }
            if (event.key === c.shoot) { sendShoot(player.ws);        return; }
        }
    });

    // ─── Rendering ────────────────────────────────────────────────────────────

    /**
     * Return the local player index (1-based) whose localId matches playerId,
     * or 0 when the playerId belongs to a remote player.
     */
    function localPlayerIndex(playerId) {
        for (const p of players) {
            if (p.localId === playerId) return p.index;
        }
        return 0;
    }

    /** Draw the grid background. */
    function renderGrid() {
        ctx.strokeStyle = '#222244';
        ctx.lineWidth   = 0.5;
        for (let x = 0; x <= canvas.width; x += TILE) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += TILE) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    }

    /** Render all players from the supplied game state. */
    function renderPlayers(gameData) {
        for (const playerId in gameData.players) {
            const player = gameData.players[playerId];
            const idx    = localPlayerIndex(playerId);

            // Use the color assigned by the server so all clients see consistent
            // player colors.  Local players still get a label so they're easy to
            // identify on screen.
            const color = player.color || 'gray';

            const px = player.x * TILE;
            const py = player.y * TILE;

            // Player body
            ctx.fillStyle = color;
            ctx.fillRect(px, py, TILE, TILE);

            // Player number label (local players only)
            if (idx > 0) {
                ctx.fillStyle = 'white';
                ctx.font      = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`P${idx}`, px + TILE / 2, py + TILE / 2 + 4);
            }
        }
        ctx.textAlign = 'left'; // reset
    }

    /** Render all active shots. */
    function renderShots(gameData) {
        for (const shot of gameData.shots) {
            // Tint the shot to match its owner when possible
            const owner = gameData.players[shot.playerId];
            ctx.fillStyle = owner ? owner.color : 'red';

            const offset = (TILE - 8) / 2; // center the 8×8 projectile in a tile
            ctx.fillRect(shot.x * TILE + offset, shot.y * TILE + offset, 8, 8);
        }
    }

    /**
     * Full render pass – clears the canvas then draws grid, players, shots.
     * @param {object} gameData  Parsed server broadcast
     */
    function render(gameData) {
        if (!gameData) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        renderGrid();
        renderPlayers(gameData);
        renderShots(gameData);
    }
</script>
</body>
</html>
