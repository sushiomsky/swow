<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wizard of Wor Battle Royale</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const ws = new WebSocket('ws://localhost:5001');

    function renderGame(gameData) {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Render players
        for (const playerId in gameData.players) {
            const player = gameData.players[playerId];
            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x * 20, player.y * 20, 20, 20);
        }

        // Render shots
        for (const shot of gameData.shots) {
            ctx.fillStyle = 'red';
            ctx.fillRect(shot.x * 20, shot.y * 20, 10, 10);
        }
    }

    ws.onmessage = (event) => {
        renderGame(JSON.parse(event.data));
    };

    function movePlayer(x, y) {
        const movementData = {
            type: 'movement',
            data: { x, y },
        };
        ws.send(JSON.stringify(movementData));
    }

    function shoot(direction) {
        const shootData = {
            type: 'shoot',
            data: { direction },
        };
        ws.send(JSON.stringify(shootData));
    }

    document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowUp') {
            movePlayer(0, -1);
        } else if (event.key === 'ArrowDown') {
            movePlayer(0, 1);
        } else if (event.key === 'ArrowLeft') {
            movePlayer(-1, 0);
        } else if (event.key === 'ArrowRight') {
            movePlayer(1, 0);
        } else if (event.key === ' ') {
            shoot('up');
        }
    });

    // Gamepad support (up to 2 controllers)
    const AXIS_THRESHOLD = 0.5;
    const GAMEPAD_POLL_INTERVAL = 100; // ms

    // One WebSocket connection per gamepad player
    const gamepadWs = [null, null];
    // Track last direction each gamepad player moved (for shooting)
    const gamepadLastDir = ['up', 'up'];
    // Track previous shoot-button state to detect press (not hold)
    const gamepadShootWasPressed = [false, false];

    function createGamepadWs(index) {
        const socket = new WebSocket('ws://localhost:5001');
        // Gamepad players share the same renderer driven by the keyboard ws;
        // ignore game-state messages on these connections to avoid duplicate renders.
        socket.onclose = () => {
            gamepadWs[index] = null;
        };
        return socket;
    }

    window.addEventListener('gamepadconnected', (event) => {
        const index = event.gamepad.index;
        if (index < 2 && !gamepadWs[index]) {
            gamepadWs[index] = createGamepadWs(index);
            console.log(`Gamepad ${index + 1} connected: ${event.gamepad.id}`);
        }
    });

    window.addEventListener('gamepaddisconnected', (event) => {
        const index = event.gamepad.index;
        if (index < 2 && gamepadWs[index]) {
            gamepadWs[index].close();
            gamepadWs[index] = null;
            console.log(`Gamepad ${index + 1} disconnected`);
        }
    });

    function sendGamepadMove(index, x, y) {
        const socket = gamepadWs[index];
        if (socket && socket.readyState === WebSocket.OPEN) {
            // Track last direction for shoot targeting; when moving diagonally,
            // prefer the axis with the larger magnitude.
            if (Math.abs(x) >= Math.abs(y)) {
                if (x > 0) gamepadLastDir[index] = 'right';
                else if (x < 0) gamepadLastDir[index] = 'left';
            } else {
                if (y < 0) gamepadLastDir[index] = 'up';
                else if (y > 0) gamepadLastDir[index] = 'down';
            }
            socket.send(JSON.stringify({ type: 'movement', data: { x, y } }));
        }
    }

    function sendGamepadShoot(index) {
        const socket = gamepadWs[index];
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: 'shoot', data: { direction: gamepadLastDir[index] } }));
        }
    }

    // Poll gamepad state at a fixed interval
    setInterval(() => {
        // navigator.getGamepads() is available in all modern browsers that support the Gamepad API
        const gamepads = navigator.getGamepads();
        for (let i = 0; i < 2; i++) {
            const gamepad = gamepads[i];
            if (!gamepad || !gamepadWs[i]) continue;

            // Movement: Standard Gamepad layout D-pad (buttons 12=up, 13=down, 14=left, 15=right)
            // or left analog stick (axes[0]=X, axes[1]=Y).
            const dpadUp    = gamepad.buttons[12] && gamepad.buttons[12].pressed;
            const dpadDown  = gamepad.buttons[13] && gamepad.buttons[13].pressed;
            const dpadLeft  = gamepad.buttons[14] && gamepad.buttons[14].pressed;
            const dpadRight = gamepad.buttons[15] && gamepad.buttons[15].pressed;

            const axisX = gamepad.axes[0] || 0;
            const axisY = gamepad.axes[1] || 0;

            let moveX = 0;
            let moveY = 0;

            if (dpadLeft  || axisX < -AXIS_THRESHOLD) moveX = -1;
            else if (dpadRight || axisX >  AXIS_THRESHOLD) moveX =  1;

            if (dpadUp    || axisY < -AXIS_THRESHOLD) moveY = -1;
            else if (dpadDown  || axisY >  AXIS_THRESHOLD) moveY =  1;

            if (moveX !== 0 || moveY !== 0) {
                sendGamepadMove(i, moveX, moveY);
            }

            // Shoot: face button A / Cross (button index 0), fire on press (not hold)
            const shootPressed = gamepad.buttons[0] && gamepad.buttons[0].pressed;
            if (shootPressed && !gamepadShootWasPressed[i]) {
                sendGamepadShoot(i);
            }
            gamepadShootWasPressed[i] = shootPressed;
        }
    }, GAMEPAD_POLL_INTERVAL);
</script>
</body>
</html>
