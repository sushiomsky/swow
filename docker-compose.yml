services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: node server.js
    environment:
      PORT: 8080
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  multiplayer:
    build:
      context: .
      dockerfile: Dockerfile
    command: node server-multiplayer.js
    environment:
      MP_PORT: 5001
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5001/multiplayer.html').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wow_community
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wow_community"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  community-api:
    build:
      context: ./community-api
      dockerfile: Dockerfile
    environment:
      COMMUNITY_API_PORT: 7000
      COMMUNITY_JWT_SECRET: ${COMMUNITY_JWT_SECRET:-change-me}
      COMMUNITY_ALLOW_DEV_AUTH: ${COMMUNITY_ALLOW_DEV_AUTH:-false}
      COMMUNITY_DATABASE_URL: postgres://postgres:postgres@postgres:5432/wow_community
      COMMUNITY_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:7000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  community-web:
    build:
      context: ./community-web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_COMMUNITY_API_BASE: /api/community
      NEXT_PUBLIC_COMMUNITY_SOCKET_URL: ""
    depends_on:
      community-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  edge:
    image: caddy:2.9
    depends_on:
      web:
        condition: service_healthy
      multiplayer:
        condition: service_healthy
      community-api:
        condition: service_healthy
      community-web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
