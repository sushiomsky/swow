<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Map — Wizard of Wor</title>
    <link rel="stylesheet" href="/frontend/styles/shared.css">
    <link rel="stylesheet" href="/frontend/app/play.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'WizardOfWor', monospace;
        }
        
        #minimap-page-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        #minimap-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #111;
            border-bottom: 2px solid #333;
            color: #8af;
        }
        
        .minimap-page-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .minimap-back-btn {
            padding: 8px 20px;
            background: #222;
            border: 1px solid #444;
            color: #aaa;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .minimap-back-btn:hover {
            background: #333;
            border-color: #66a;
            color: #fff;
        }
        
        #minimap-container {
            flex: 1;
            overflow: hidden;
            background: #0a0a0a;
        }
    </style>
</head>
<body>
    <div id="minimap-page-container">
        <div id="minimap-page-header">
            <span class="minimap-page-title">🗺 DUNGEON OVERVIEW</span>
            <a href="/play" class="minimap-back-btn">← BACK TO LOBBY</a>
        </div>
        
        <div id="minimap-container"></div>
    </div>
    
    <script type="module">
        import { MiniMapView } from '/frontend/app/MiniMapView.js';
        
        // Initialize mini-map on page load
        const minimap = new MiniMapView('minimap-container');
        minimap.init();
        
        // Make available globally for debugging
        window.minimap = minimap;
    </script>
</body>
</html>
