name: Community and Surface CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  community-api-quality:
    name: Community API quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wow_community
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wow_community"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      COMMUNITY_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/wow_community
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: community-api/package-lock.json
      - name: Community API install + checks
        run: |
          npm --prefix community-api ci
          npm --prefix community-api run migrate:up
          npm --prefix community-api run test:integration
          npm --prefix community-api run check

  community-web-quality:
    name: Community web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: community-web/package-lock.json
      - name: Community web install + build
        run: |
          npm --prefix community-web ci
          npm --prefix community-web run build

  surface-smoke:
    name: Smoke (${{ matrix.surface }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        surface:
          - classic-web
          - classic-multiplayer
          - community-api
          - community-web
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wow_community
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wow_community"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      COMMUNITY_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/wow_community
      COMMUNITY_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            community-api/package-lock.json
            community-web/package-lock.json
      - name: Install dependencies for smoke target
        run: |
          case "${{ matrix.surface }}" in
            classic-web|classic-multiplayer)
              npm ci
              ;;
            community-api)
              npm --prefix community-api ci
              ;;
            community-web)
              npm --prefix community-web ci
              ;;
          esac
      - name: Run smoke checks
        run: |
          mkdir -p "ci-logs/${{ matrix.surface }}"
          bash scripts/ci-smoke.sh "${{ matrix.surface }}" "ci-logs/${{ matrix.surface }}"
      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.surface }}-logs
          path: ci-logs/${{ matrix.surface }}
          if-no-files-found: warn

  multiplayer-agent-gate:
    name: Multiplayer agent gate (netcode + gameplay)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Start multiplayer server
        run: |
          mkdir -p ci-logs/agents
          nohup node server-multiplayer.js > ci-logs/agents/multiplayer-server.log 2>&1 &
          echo $! > ci-logs/agents/multiplayer-server.pid
      - name: Wait for multiplayer health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:42735/multiplayer/active-games" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "multiplayer server failed to become healthy"
          exit 1
      - name: Run netcode and gameplay agents
        env:
          NETCODE_CHECK_HTTP_BASE: http://127.0.0.1:42735
          NETCODE_CHECK_WS_URL: ws://127.0.0.1:42735/multiplayer
          GAMEPLAY_CHECK_BASE_URL: http://127.0.0.1:42735
        run: |
          npm run agent:netcode
          npm run agent:gameplay
      - name: Upload multiplayer agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multiplayer-agent-logs
          path: ci-logs/agents
          if-no-files-found: warn
      - name: Stop multiplayer server
        if: always()
        run: |
          if [ -f ci-logs/agents/multiplayer-server.pid ]; then
            kill "$(cat ci-logs/agents/multiplayer-server.pid)" >/dev/null 2>&1 || true
          fi

  ci-required-gate:
    name: Required CI gate
    runs-on: ubuntu-latest
    needs:
      - community-api-quality
      - community-web-quality
      - surface-smoke
      - multiplayer-agent-gate
    if: always()
    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.community-api-quality.result }}" != "success" ]; then
            echo "community-api-quality result: ${{ needs.community-api-quality.result }}"
            exit 1
          fi
          if [ "${{ needs.community-web-quality.result }}" != "success" ]; then
            echo "community-web-quality result: ${{ needs.community-web-quality.result }}"
            exit 1
          fi
          if [ "${{ needs.surface-smoke.result }}" != "success" ]; then
            echo "surface-smoke result: ${{ needs.surface-smoke.result }}"
            exit 1
          fi
          if [ "${{ needs.multiplayer-agent-gate.result }}" != "success" ]; then
            echo "multiplayer-agent-gate result: ${{ needs.multiplayer-agent-gate.result }}"
            exit 1
          fi
          echo "All required quality and smoke checks passed."
