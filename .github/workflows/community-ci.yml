name: Community CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  community-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Community API install + check
        run: |
          npm --prefix community-api install
          npm --prefix community-api run test:integration
          npm --prefix community-api run check
      - name: Community web install + build
        run: |
          npm --prefix community-web install
          npm --prefix community-web run build
