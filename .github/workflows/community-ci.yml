name: Community CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  community-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wow_community
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wow_community"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Community API install + check
        env:
          COMMUNITY_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/wow_community
        run: |
          npm --prefix community-api install
          npm --prefix community-api run migrate:up
          npm --prefix community-api run test:integration
          npm --prefix community-api run check
      - name: Community web install + build
        run: |
          npm --prefix community-web install
          npm --prefix community-web run build
